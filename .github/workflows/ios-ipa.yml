name: Build iOS .ipa (unsigned)

# Builds an UNSIGNED .ipa of the Intent native shell on a free GitHub-hosted
# macOS runner (free for public repos). Download the artifact, then sign + install
# it from Windows with a free Apple ID using Sideloadly or AltStore — no Mac and
# no paid Apple Developer account required. See docs/ios-install.md.
#
# Run it: GitHub → Actions tab → "Build iOS .ipa (unsigned)" → Run workflow.

on:
  workflow_dispatch:        # manual button in the Actions tab
  push:
    tags: ['ios-*']         # ...or push a tag like ios-v1 to trigger a build

jobs:
  build-ipa:
    runs-on: macos-15        # Capacitor 8 needs a recent Xcode (26); macos-14 ships 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        # Capacitor 8 requires Xcode 26+. Pick the newest installed on the runner.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Generate iOS project (Capacitor)
        # ios/ is a generated artifact (gitignored), so regenerate it here.
        # Capacitor 8 defaults to Swift Package Manager (no .xcworkspace); force
        # CocoaPods so the build step's `-workspace App.xcworkspace` works and the
        # capacitor-calendar pod is integrated.
        run: |
          npx cap add ios --packagemanager CocoaPods
          npx cap sync ios

      - name: Add calendar usage descriptions to Info.plist
        # Required for @ebarooni/capacitor-calendar (EventKit). ios/ is regenerated
        # above, so the keys must be injected here each build. Add the full set so
        # whichever the OS version needs is present (avoids a permission crash).
        run: |
          PLIST=ios/App/App/Info.plist
          MSG="Intent shows your phone's calendars (including work calendars) alongside your plans. Read-only."
          for KEY in NSCalendarsUsageDescription NSCalendarsFullAccessUsageDescription NSCalendarsReadOnlyAccessUsageDescription NSCalendarsWriteOnlyAccessUsageDescription; do
            /usr/libexec/PlistBuddy -c "Add :$KEY string $MSG" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :$KEY $MSG" "$PLIST"
          done
          /usr/libexec/PlistBuddy -c "Print :NSCalendarsFullAccessUsageDescription" "$PLIST"

      - name: Build unsigned .ipa
        run: |
          set -eo pipefail
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          APP_PATH="build/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then echo "App.app not found"; exit 1; fi
          mkdir -p Payload
          cp -R "$APP_PATH" "Payload/App.app"
          zip -qq -r Intent-unsigned.ipa Payload
          echo "Built $(du -h Intent-unsigned.ipa | cut -f1) ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Intent-unsigned-ipa
          path: ios/App/Intent-unsigned.ipa
          if-no-files-found: error
